services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resume_interview_workbench}
      POSTGRES_USER: ${POSTGRES_USER:-resume_interview_workbench}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resume_interview_workbench}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-resume_interview_workbench} -d ${POSTGRES_DB:-resume_interview_workbench}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
